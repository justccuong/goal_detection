services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: smartplay-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - /app/.venv
      - /app/__pycache__
      - /app/temp_uploads
      - /app/temp_outputs
    environment:
      - PYTHONUNBUFFERED=1

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: smartplay-frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
